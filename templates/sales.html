<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .sidebar ul li:hover {
            background: #334155;
        }

        /* Main */
        .main {
            margin-left: 250px;
            padding: 20px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logout-btn {
            padding: 8px 15px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #334155;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        table th, table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        table th {
            background: #1e293b;
            color: white;
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Sales Panel</h2>
        <ul>
            <li>Dashboard</li>
            <li>Orders</li>
            <li>Customers</li>
            <li>Reports</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="header">
            <h1>Sales Dashboard</h1>
            <a href="{{ url_for('logout') }}">
                <button class="logout-btn">Logout</button>
            </a>
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Sales</h3>
                <p>$12,500</p>
            </div>

            <div class="card">
                <h3>Orders Today</h3>
                <p>85</p>
            </div>

            <div class="card">
                <h3>New Customers</h3>
                <p>25</p>
            </div>

            <div class="card">
                <h3>Revenue Growth</h3>
                <p>+18%</p>
            </div>
        </div>

        <!-- Table -->
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>#1001</td>
                    <td>John Doe</td>
                    <td>$120</td>
                    <td>Completed</td>
                </tr>

                <tr>
                    <td>#1002</td>
                    <td>Jane Smith</td>
                    <td>$75</td>
                    <td>Pending</td>
                </tr>

                <tr>
                    <td>#1003</td>
                    <td>Alex Brown</td>
                    <td>$200</td>
                    <td>Completed</td>
                </tr>
            </tbody>
        </table>

    </div>

</body>
</html>
